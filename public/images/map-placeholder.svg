<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="2048" viewBox="0 0 2048 2048">
  <defs>
    <pattern id="smallGrid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="rgba(0,170,255,0.06)" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid" width="256" height="256" patternUnits="userSpaceOnUse">
      <rect width="256" height="256" fill="url(#smallGrid)"/>
      <path d="M 256 0 L 0 0 0 256" fill="none" stroke="rgba(0,170,255,0.12)" stroke-width="1"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(4,12,26,0.6)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="2048" height="2048" fill="#060e20"/>

  <!-- Grid -->
  <rect width="2048" height="2048" fill="url(#grid)"/>

  <!-- Centre crosshair -->
  <line x1="1024" y1="0" x2="1024" y2="2048" stroke="rgba(0,170,255,0.08)" stroke-width="1" stroke-dasharray="8,16"/>
  <line x1="0" y1="1024" x2="2048" y2="1024" stroke="rgba(0,170,255,0.08)" stroke-width="1" stroke-dasharray="8,16"/>

  <!-- Centre diamond -->
  <polygon points="1024,1010 1038,1024 1024,1038 1010,1024" fill="none" stroke="rgba(0,170,255,0.15)" stroke-width="1"/>

  <!-- Quadrant labels -->
  <text x="200" y="200" font-family="monospace" font-size="14" fill="rgba(0,170,255,0.12)" letter-spacing="3">SECTOR NW</text>
  <text x="1700" y="200" font-family="monospace" font-size="14" fill="rgba(0,170,255,0.12)" letter-spacing="3">SECTOR NE</text>
  <text x="200" y="1880" font-family="monospace" font-size="14" fill="rgba(0,170,255,0.12)" letter-spacing="3">SECTOR SW</text>
  <text x="1700" y="1880" font-family="monospace" font-size="14" fill="rgba(0,170,255,0.12)" letter-spacing="3">SECTOR SE</text>

  <!-- Coordinate ticks along edges -->
  <text x="512" y="30" font-family="monospace" font-size="10" fill="rgba(0,170,255,0.1)">25</text>
  <text x="1024" y="30" font-family="monospace" font-size="10" fill="rgba(0,170,255,0.1)">50</text>
  <text x="1536" y="30" font-family="monospace" font-size="10" fill="rgba(0,170,255,0.1)">75</text>
  <text x="10" y="516" font-family="monospace" font-size="10" fill="rgba(0,170,255,0.1)">25</text>
  <text x="10" y="1028" font-family="monospace" font-size="10" fill="rgba(0,170,255,0.1)">50</text>
  <text x="10" y="1540" font-family="monospace" font-size="10" fill="rgba(0,170,255,0.1)">75</text>

  <!-- Title watermark -->
  <text x="1024" y="1024" font-family="monospace" font-size="48" fill="rgba(0,170,255,0.04)" text-anchor="middle" dominant-baseline="middle" letter-spacing="12">BLACK SHORES</text>

  <!-- Vignette -->
  <rect width="2048" height="2048" fill="url(#vignette)"/>
</svg>
